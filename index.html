<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>電子名片｜你的品牌名稱</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="card">
    <section class="profile">
      <div class="logo">LOGO</div>

      <p class="label">Digital Business Card</p>
      <h1></h1>
      <p class="description">
        這裡放一句簡短介紹，例如：寶可夢卡牌預購｜收藏｜商品資訊
      </p>
    </section>

    <section class="links">
      <a class="link-button" href="https://www.instagram.com/你的帳號" target="_blank">
        Instagram
      </a>

      <a class="link-button" href="https://www.facebook.com/你的粉專" target="_blank">
        Facebook
      </a>

      <a class="link-button line" href="你的 LINE 加好友連結" target="_blank">
        LINE 加好友
      </a>

      <a class="link-button secondary" href="mailto:你的信箱@example.com">
        Email 聯絡
      </a>
    </section>

    <footer class="footer">
      <p>© 2026 你的品牌名稱</p>
    </footer>
  </main>
</body>
</html>
